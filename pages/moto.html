<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride — nahnew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/moto.css">
</head>
<body style="--accent: var(--c-moto); --c-bg: #F0E2D8; background: #F0E2D8">

  <nav class="page-nav">
    <a href="../index.html" class="nav-back">&#8592; nahnew</a>
    <div class="nav-links">
      <a href="craft.html" class="nav-link">Craft</a>
      <a href="art.html"   class="nav-link">Art</a>
      <a href="moto.html"  class="nav-link is-active">Ride</a>
      <a href="dev.html"   class="nav-link">Dev</a>
    </div>
  </nav>

  <section class="page-hero">
    <span class="page-hero__label">03 / Ride</span>
    <h1 class="page-hero__title">Ride</h1>
    <p class="page-hero__sub">
      Every route tells a story. Click a pin on the map to see photos from that ride.
    </p>
  </section>

  <!-- ── Map + photo split ── -->
  <section class="travel-section">
    <div class="map-wrap">
      <!-- Route filter buttons -->
      <div class="route-btns" id="routeBtns">
        <button class="route-btn is-active" data-route="0">All</button>
        <button class="route-btn" data-route="1">紅葉</button>
        <button class="route-btn" data-route="2">400X</button>
        <button class="route-btn" data-route="3">金沢</button>
        <button class="route-btn" data-route="4">関西</button>
        <button class="route-btn" data-route="5">富士</button>
        <button class="route-btn" data-route="6">南</button>
        <button class="route-btn" data-route="7">北</button>
      </div>
      <div id="map"></div>
    </div>

    <div class="photo-panel" id="photoPanel">
      <div class="photo-panel__empty" id="photoEmpty">
        <span>Select a pin on the map<br>to view photos</span>
      </div>
      <div class="photo-panel__place" id="photoPlace" style="display:none">
        <h3 class="place-name" id="placeName"></h3>
        <div class="photo-grid" id="photoGrid"></div>
      </div>

      <!-- Loading spinner -->
      <div class="photo-loading" id="photoLoading" style="display:none">
        <div class="spinner"></div>
      </div>
    </div>
  </section>

  <!-- ── Lightbox ── -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lightboxClose">&#10005;</button>
    <img class="lightbox__img" id="lightboxImg" src="" alt="">
  </div>

  <!-- ── Videos ── -->
  <section class="videos-section">
    <h2 class="section-title">Travel <span>Videos</span></h2>
    <p class="videos-intro">Short clips from the road.</p>

    <div class="video-grid">
      <div class="video-card">
        <div class="video-wrap">
          <iframe src="https://drive.google.com/file/d/10yOnD181FR8whNWbtuPkjycJR7VVf3u-/preview"
            allow="autoplay" allowfullscreen loading="lazy"></iframe>
        </div>
        <p class="video-label">Hokkaido</p>
      </div>
      <div class="video-card">
        <div class="video-wrap">
          <iframe src="https://drive.google.com/file/d/17xYnDf8CcuV1SkcRv1rdXs7KmfU4u0rO/preview"
            allow="autoplay" allowfullscreen loading="lazy"></iframe>
        </div>
        <p class="video-label">北</p>
      </div>
      <div class="video-card">
        <div class="video-wrap">
          <iframe src="https://drive.google.com/file/d/1xVwdvBeCNRl5SFvhLMzN6ZzQ3vPej7G6/preview"
            allow="autoplay" allowfullscreen loading="lazy"></iframe>
        </div>
        <p class="video-label">Monochrome</p>
      </div>
      <div class="video-card">
        <div class="video-wrap">
          <iframe src="https://drive.google.com/file/d/1dfDjJIH9nP_Ovw70N4JtmaWIA5uyaANX/preview"
            allow="autoplay" allowfullscreen loading="lazy"></iframe>
        </div>
        <p class="video-label">夢旅人</p>
      </div>
    </div>
  </section>

  <script src="../js/moto.js"></script>
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDZClCw9r5G_GaA_EWmWVNrKcOzPZOvux0&callback=initMap&libraries=geometry&loading=async">
  </script>
</body>
</html>
